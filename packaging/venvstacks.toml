# Canopy venvstacks configuration
# Build portable macOS app with chat server + document parsing bundled

[[runtimes]]
name = "cpython-3.11"
python_implementation = "cpython@3.11.10"
requirements = []
platforms = [
    "macosx_arm64",
]

[[frameworks]]
name = "canopy-framework"
runtime = "cpython-3.11"
requirements = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "httpx>=0.25.0",
    "aiosqlite>=0.19.0",
    "jinja2>=3.0",
    "python-multipart>=0.0.6",
    "pdfplumber>=0.10.0",
    "docx2python>=2.0.0",
    "markitdown>=0.1.0",
    "requests>=2.28.0",
    "packaging>=23.0",
]
platforms = [
    "macosx_arm64",
]

[[applications]]
name = "canopy-app"
launch_module = "canopy_app"
frameworks = ["canopy-framework"]
requirements = [
    "pyobjc-core>=10.0",
    "pyobjc-framework-Cocoa>=10.0",
]
platforms = [
    "macosx_arm64",
]

[tool.uv]
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
]
